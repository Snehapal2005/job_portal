<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Login</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #3b5998, #00a8cc);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.login-box {
    background: white;
    padding: 30px;
    border-radius: 12px;
    width: 300px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

h2 {
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 10px;
    background: #3b5998;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
}

button:hover {
    background: #2d4373;
}

.error {
    color: red;
    font-size: 13px;
}
</style>
</head>

<body>

<div class="login-box">
    <h2>Admin Login</h2>

    <input type="text" id="user" placeholder="Username">
    <input type="password" id="pass" placeholder="Password">

    <div id="error" class="error"></div>

    <button onclick="login()">Login</button>
</div>

<script>
function login(){
    let user = document.getElementById("user").value;
    let pass = document.getElementById("pass").value;

    if(!user || !pass){
        document.getElementById("error").innerText = "Please fill all fields ⚠️";
        return;
    }

    if(user === "admin" && pass === "1234"){
        localStorage.setItem("admin","true");
        window.location.href = "admin.html";
    } else {
        document.getElementById("error").innerText = "Invalid Username or Password ❌";
    }
}
</script>
</body>
</html>
