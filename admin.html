<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f9;
    padding: 20px;
}

.container {
    max-width: 1100px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

h2 {
    text-align: center;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
    display: block;
    overflow-x: auto;
}

th {
    background: #3b5998;
    color: white;
    padding: 10px;
}

td {
    padding: 8px;
    border-bottom: 1px solid #ddd;
    text-align: center;
}

tr:hover {
    background: #f1f1f1;
}

button {
    padding: 10px;
    margin-top: 15px;
    border: none;
    background: green;
    color: white;
    cursor: pointer;
}

@media(max-width:600px){
    table {
        font-size: 12px;
    }
}

</style>
</head>

<body>

<div class="container">
    <h2>Admin Dashboard</h2>
    <button onclick="logout()">Logout</button>

<script>
function logout(){
    localStorage.removeItem("admin");
    window.location.href = "login.html";
}
</script>

    <button onclick="downloadExcel()">Download Excel</button>

    <table id="dataTable">
        <thead>
            <tr>
                <th>Date</th>
                <th>Line</th>
                <th>Department</th>
                <th>Location</th>
                <th>Activity</th>
                <th>Category</th>
                <th>Priority</th>
                <th>Person</th>
                <th>Critical</th>
                <th>Supervisor</th>
                <th>Contact</th>
                <th>Permit</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
   

// 🔐 login check

// 🔐 login check
if(localStorage.getItem("admin") !== "true"){
    window.location.href = "login.html";
}

// 🔥 YOUR REAL URL
const API_URL = "https://jobportal-production-dbb4.up.railway.app/api/jobplans";

// 📊 DATA FETCH
fetch(API_URL)
.then(res => res.json())
.then(data => {
    let table = document.querySelector("#dataTable tbody");

    data.forEach(job => {
        table.innerHTML += `
        <tr>
            <td>${job.date}</td>
            <td>${job.line}</td>
            <td>${job.department}</td>
            <td>${job.location}</td>
            <td>${job.activity}</td>
            <td>${job.category}</td>
            <td>${job.priority}</td>
            <td>${job.person}</td>
            <td>${job.critical}</td>
            <td>${job.supervisor}</td>
            <td>${job.contact}</td>
            <td>${job.permit}</td>
            <td>${job.status}</td>
        </tr>`;
    });
})
.catch(err => {
    console.error("Error:", err);
    alert("Data load error ❌");
});

// 📥 EXCEL DOWNLOAD
function downloadExcel() {

    fetch(API_URL)
    .then(res => res.json())
    .then(data => {

        let csv = "Date,Line,Department,Location,Activity,Category,Priority,Person,Critical,Supervisor,Contact,Permit,Status\n";

        data.forEach(d => {
            csv += `${d.date},${d.line},${d.department},${d.location},${d.activity},${d.category},${d.priority},${d.person},${d.critical},${d.supervisor},${d.contact},${d.permit},${d.status}\n`;
        });

        let blob = new Blob([csv], {type:"text/csv"});
        let a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "job_report.csv";
        a.click();
    });
}

// logout
function logout(){
    localStorage.removeItem("admin");
    window.location.href = "login.html";
}

</script>
</body>
</html>
